services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "6003:5432"

  backend:
    image: abishlalns/wealthyfy-backend:latest
    ports:
      - "6001:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTHENTIK_ISSUER=${AUTHENTIK_ISSUER}
      - AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}
      - ENABLE_AUTH=${ENABLE_AUTH}
    depends_on:
      - db

  frontend:
    image: abishlalns/wealthyfy-frontend:latest
    ports:
      - "6000:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_AUTHENTIK_ISSUER=${VITE_AUTHENTIK_ISSUER}
      - VITE_AUTHENTIK_CLIENT_ID=${VITE_AUTHENTIK_CLIENT_ID}
      - VITE_ENABLE_AUTH=${VITE_ENABLE_AUTH}
    depends_on:
      - backend

volumes:
  postgres_data:
